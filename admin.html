<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gestão</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>

    <div id="login-screen" class="admin-container">
        <div class="admin-card">
            <h2>Acesso Restrito</h2>
            <form id="login-form">
                <div class="input-group">
                    <label for="admin-email">E-mail</label>
                    <input type="email" id="admin-email" required>
                </div>
                <div class="input-group">
                    <label for="admin-password">Senha</label>
                    <input type="password" id="admin-password" required>
                </div>
                <button type="submit" class="btn-primary">Entrar no Sistema</button>
            </form>
        </div>
    </div>

    <div id="dashboard-screen" class="admin-dashboard" style="display: none;">
        <header class="dashboard-header">
            <h2>Gestão do Catálogo</h2>
            <button id="logout-btn" class="btn-secondary">Sair</button>
        </header>

        <main class="dashboard-content">
            
            <section class="admin-card">
                <h3>Gerenciar Produtos</h3>
                <div class="table-responsive">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Capa</th>
                                <th>Nome</th>
                                <th>Categoria</th>
                                <th>Preço</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="products-table-body">
                            </tbody>
                    </table>
                </div>
            </section>

            <section class="admin-card">
                <h3 id="form-title">Novo Produto</h3>
                <form id="product-form">
                    
                    <div class="input-group">
                        <label for="product-name">Nome do Produto (Opcional)</label>
                        <input type="text" id="product-name">
                    </div>
                    
                    <div class="input-group">
                        <label for="product-description">Descrição (Opcional)</label>
                        <textarea id="product-description" rows="3"></textarea>
                    </div>
                    
                    <div class="input-group">
                        <label for="product-category">Categoria</label>
                        <select id="product-category" required>
                            <option value="">Selecione uma categoria...</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="product-price">Preço</label>
                        <input type="number" id="product-price" step="0.01">
                    </div>
                    
                    <div class="input-group" style="background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px dashed var(--primary-blue);">
                        <label for="product-cover" style="color: var(--primary-blue);">1. Imagem Principal (Capa da Vitrine)</label>
                        <input type="file" id="product-cover" accept="image/*" required>
                    </div>

                    <div class="input-group" style="margin-top: 15px;">
                        <label for="product-gallery">2. Imagens Adicionais (Galeria interna)</label>
                        <p style="font-size: 12px; color: #666; margin-bottom: 8px;">*Na edição, estas fotos serão somadas à galeria atual (Máx. 50).</p>
                        <input type="file" id="product-gallery" accept="image/*" multiple>
                    </div>
                    
                    <button type="submit" class="btn-primary" id="btn-salvar-produto">Adicionar ao Catálogo</button>
                    <button type="button" class="btn-secondary" id="btn-cancel-edit" style="display: none; margin-top: 10px;">Cancelar Edição</button>
                </form>
            </section>

            <section class="admin-card">
                <h3 id="category-form-title">Nova Categoria</h3>
                <form id="category-form">
                    <div class="input-group">
                        <label for="category-name">Nome da Categoria</label>
                        <input type="text" id="category-name" required>
                    </div>
                    <button type="submit" class="btn-primary" id="btn-salvar-categoria">Salvar Categoria</button>
                    <button type="button" class="btn-secondary" id="btn-cancel-category-edit" style="display: none; margin-top: 10px;">Cancelar Edição</button>
                </form>

                <h3 style="margin-top: 40px;">Categorias Existentes</h3>
                <div class="table-responsive">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Nome da Categoria</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="categories-table-body">
                            </tbody>
                    </table>
                </div>
            </section>

        </main>
    </div>

    <script type="module" src="admin-app.js"></script>
</body>
</html>
