<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gestão - France Decor</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>

    <div id="login-screen" class="admin-container">
        <div class="admin-card">
            <h2>Acesso Restrito</h2>
            <form id="login-form">
                <div class="input-group">
                    <label for="admin-email">E-mail</label>
                    <input type="email" id="admin-email" required>
                </div>
                <div class="input-group">
                    <label for="admin-password">Senha</label>
                    <input type="password" id="admin-password" required>
                </div>
                <button type="submit" class="btn-primary">Entrar no Sistema</button>
            </form>
        </div>
    </div>

    <div id="dashboard-screen" class="admin-dashboard" style="display: none;">
        <header class="dashboard-header">
            <h2>Gestão do Catálogo</h2>
            <button id="logout-btn" class="btn-secondary">Sair</button>
        </header>

        <main class="dashboard-content">
            <section class="admin-card">
                <h3>Nova Categoria</h3>
                <form id="category-form">
                    <div class="input-group">
                        <label for="category-name">Nome da Categoria</label>
                        <input type="text" id="category-name" required>
                    </div>
                    <button type="submit" class="btn-primary">Salvar Categoria</button>
                </form>
            </section>

            <section class="admin-card">
                <h3>Novo Produto</h3>
                <form id="product-form">
                    <div class="input-group">
                        <label for="product-name">Nome do Produto</label>
                        <input type="text" id="product-name" required>
                    </div>
                    <div class="input-group">
                        <label for="product-description">Descrição</label>
                        <textarea id="product-description" rows="3" required></textarea>
                    </div>
                    <div class="input-group">
                        <label for="product-category">Categoria</label>
                        <select id="product-category" required>
                            <option value="">Selecione uma categoria...</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="product-price">Preço</label>
                        <input type="number" id="product-price" step="0.01">
                    </div>
                    <div class="input-group">
                        <label for="product-image">Imagens do Produto (Selecione várias)</label>
                        <input type="file" id="product-image" accept="image/*" multiple required>
                    </div>
                    <button type="submit" class="btn-primary" id="btn-salvar-produto">Adicionar ao Catálogo</button>
                </form>
            </section>
        </main>
    </div>

    <script type="module" src="admin-app.js"></script>
</body>
</html>
